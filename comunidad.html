<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OFFSIDE 2026 | Comunidad</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root{--mx-green:#006847;--mx-red:#ce1126;--mx-gold:#f5a623;--mx-dark:#0a0f0d;--mx-gradient:linear-gradient(135deg,var(--mx-green),#009a63,var(--mx-gold));--glass:rgba(10,15,13,0.75);--glass-light:rgba(255,255,255,0.06);--border:1px solid rgba(255,255,255,0.1);--text-main:#f0ede8;--text-dim:#8a9e94;}
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}html{scroll-behavior:smooth;}
        body{background-color:var(--mx-dark);color:var(--text-main);font-family:'Plus Jakarta Sans',sans-serif;overflow-x:hidden;cursor:none;line-height:1.6;padding-bottom:120px;margin-top:0;}
        /* 🚨 HACK WORDPRESS 🚨 */
        header#masthead,header.site-header,.elementor-location-header,header[data-elementor-type="header"],.ast-primary-header-bar,.site-header{display:none !important;opacity:0 !important;height:0 !important;overflow:hidden !important;pointer-events:none !important;}
        .site-content,.site-main,#content,body{margin-top:0 !important;padding-top:0 !important;}
        #custom-cursor{width:10px;height:10px;background:var(--mx-gold);border-radius:50%;position:fixed;pointer-events:none;z-index:10000;transform:translate(-50%,-50%);box-shadow:0 0 15px rgba(245,166,35,0.8);transition:width .3s,height .3s,background-color .3s;}
        #custom-cursor.hovered{width:26px;height:26px;background:var(--mx-red);box-shadow:0 0 25px rgba(206,17,38,0.8);}
        #cursor-glow{width:500px;height:500px;background:radial-gradient(circle,rgba(0,104,71,.12) 0,rgba(245,166,35,.05) 40%,transparent 65%);position:fixed;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);mix-blend-mode:screen;}
        #bg-canvas{position:fixed;top:0;left:0;width:100%;height:100vh;z-index:0;}
        .btn-mx{padding:11px 30px;background:var(--mx-gradient);color:#fff !important;border-radius:50px;font-weight:800;text-transform:uppercase;letter-spacing:1px;text-decoration:none;border:none;box-shadow:0 5px 20px rgba(0,104,71,.4);transition:.4s cubic-bezier(0.175,0.885,0.32,1.275);font-size:.82rem;cursor:none;display:inline-block;}
        .btn-mx:hover{transform:translateY(-3px) scale(1.05);box-shadow:0 15px 30px rgba(245,166,35,.4);}
        /* DOCK ESTILO MACOS */
        .bottom-nav-deck{position:fixed;bottom:25px;left:50%;transform:translateX(-50%);display:flex;align-items:center;justify-content:center;gap:clamp(10px,2vw,18px);background:rgba(10,15,13,0.65);backdrop-filter:blur(25px);-webkit-backdrop-filter:blur(25px);padding:10px 20px;border-radius:40px;border:1px solid rgba(255,255,255,0.1);box-shadow:0 20px 40px rgba(0,0,0,0.6),inset 0 1px 0 rgba(255,255,255,0.1);z-index:9000;transition:all .4s;} .bottom-nav-deck:hover{background:rgba(10,15,13,0.85);border-color:rgba(255,255,255,0.2);} .deck-item{color:var(--text-dim);text-decoration:none;font-size:1.25rem;width:45px;height:45px;display:flex;align-items:center;justify-content:center;border-radius:50%;transition:all .3s ease;position:relative;cursor:none;} .deck-item:hover,.deck-item.active{color:#fff;background:rgba(255,255,255,0.1);transform:translateY(-5px) scale(1.1);} .deck-item::after{content:attr(data-tooltip);position:absolute;top:-45px;background:rgba(0,0,0,0.8);color:#fff;font-size:.75rem;font-weight:600;padding:6px 12px;border-radius:8px;opacity:0;pointer-events:none;transform:translateY(10px);transition:all .3s;white-space:nowrap;border:1px solid rgba(255,255,255,0.1);} .deck-item:hover::after{opacity:1;transform:translateY(0);} .deck-item.home-btn{background:var(--mx-gradient);color:#fff!important;width:55px;height:55px;font-size:1.4rem;transform:translateY(-15px);box-shadow:0 10px 25px rgba(0,104,71,0.5);border:3px solid var(--mx-dark);} .deck-item.home-btn:hover{transform:translateY(-20px) scale(1.05);} .deck-item.emergency{color:var(--mx-red);} .deck-item.emergency:hover{background:rgba(206,17,38,0.15);color:#ff4d4d;}
        section{padding:120px 10%;position:relative;z-index:1;}
        .section-header{text-align:center;margin-bottom:70px;}
        .section-header h2{font-family:'Syne',sans-serif;font-size:clamp(2rem,3.5vw,3.2rem);font-weight:800;margin-bottom:16px;letter-spacing:-1px;color:#fff !important;}
        .section-header p{color:var(--text-dim) !important;font-size:1.05rem;}
        .gradient-text{background:var(--mx-gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
        .gsap-anim-up{opacity:0;transform:translateY(40px);}

        /* REVIEWS */
        .review-form-box{background:rgba(255,255,255,0.02);border:var(--border);border-radius:24px;padding:28px;margin-bottom:40px;}
        .review-form-box h3{font-size:1.1rem;font-weight:700;color:#fff !important;margin-bottom:16px;}
        .review-avatar{width:44px;height:44px;border-radius:50%;background:var(--mx-gradient);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:1rem;color:#fff !important;flex-shrink:0;}
        .star-input{display:flex;gap:4px;}
        .star-input i{font-size:1.2rem;color:rgba(255,255,255,0.2) !important;cursor:pointer;transition:.2s;}
        .star-input i.active,.star-input i:hover{color:var(--mx-gold) !important;}
        .photo-upload{display:flex;align-items:center;gap:8px;cursor:pointer;}
        .photo-upload i{color:var(--text-dim) !important;}
        .photo-upload span{font-size:.8rem;color:var(--text-dim) !important;}
        .photo-upload:hover i,.photo-upload:hover span{color:var(--mx-gold) !important;}
        .reviews-list{display:flex;flex-direction:column;gap:20px;}
        .review-card{background:rgba(255,255,255,0.02);border:var(--border);border-radius:20px;padding:22px;transition:.3s;}
        .review-card:hover{background:rgba(255,255,255,0.04);}
        .review-header{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
        .review-avatar-sm{width:40px;height:40px;border-radius:50%;object-fit:cover;}
        .review-user-info h4{font-size:.9rem;font-weight:700;color:#fff !important;}
        .review-user-info p{font-size:.75rem;color:var(--text-dim) !important;}
        .review-stars{margin-left:auto;display:flex;gap:2px;}
        .review-stars i{font-size:.8rem;color:var(--mx-gold) !important;}
        .review-text{font-size:.9rem;color:#c8d5cc !important;line-height:1.7;margin-bottom:12px;}
        .review-photos{display:flex;gap:8px;margin-bottom:12px;}
        .review-photos img{width:80px;height:70px;object-fit:cover;border-radius:10px;border:var(--border);transition:.3s;cursor:pointer;}
        .review-photos img:hover{transform:scale(1.05);}
        .review-actions{display:flex;gap:16px;}
        .review-actions button{background:none;border:none;color:var(--text-dim);font-size:.8rem;cursor:pointer;display:flex;align-items:center;gap:5px;transition:.3s;font-family:'Plus Jakarta Sans',sans-serif;}
        .review-actions button:hover{color:var(--mx-gold);}
        .review-flag{background:rgba(0,104,71,0.15);border:1px solid rgba(0,104,71,0.3);border-radius:8px;padding:4px 10px;font-size:.72rem;color:#64c896 !important;display:inline-flex;align-items:center;gap:4px;margin-left:auto;}

        /* FOOTER */
        footer{background:linear-gradient(to top,#02060a,transparent);padding:80px 10% 40px;border-top:var(--border);position:relative;z-index:10;}
        .footer-inner{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:40px;margin-bottom:50px;}
        .footer-brand p{color:var(--text-dim) !important;font-size:.9rem;margin:14px 0 20px;max-width:280px;}
        .footer-socials{display:flex;gap:12px;}
        .social-link{width:42px;height:42px;border-radius:50%;border:var(--border);background:rgba(255,255,255,0.03);display:flex;align-items:center;justify-content:center;color:#fff !important;font-size:1rem;transition:.4s;text-decoration:none;cursor:none;}
        .social-link:hover{background:var(--mx-green);transform:translateY(-4px);}
        .footer-col h4{font-size:.85rem;font-weight:700;color:#fff !important;text-transform:uppercase;letter-spacing:1px;margin-bottom:16px;}
        .footer-col a{display:block;color:var(--text-dim) !important;text-decoration:none;font-size:.85rem;margin-bottom:10px;transition:.3s;}
        .footer-col a:hover{color:var(--mx-gold) !important;}
        .footer-bottom{border-top:var(--border);padding-top:24px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;}
        .footer-bottom p{color:var(--text-dim) !important;font-size:.82rem;}
        .wc-badge{display:flex;align-items:center;gap:8px;background:rgba(0,104,71,0.15);border:1px solid rgba(0,104,71,0.3);border-radius:50px;padding:6px 16px;font-size:.78rem;color:#64c896 !important;}
        .notif{position:fixed;bottom:30px;right:30px;z-index:9000;display:flex;flex-direction:column;gap:10px;}
        .notif-item{background:#0e1a13;border:var(--border);border-left:3px solid var(--mx-green);border-radius:14px;padding:14px 18px;max-width:300px;transform:translateX(120%);transition:.4s cubic-bezier(0.175,0.885,0.32,1.275);}
        .notif-item.show{transform:translateX(0);}
        .notif-item h4{font-size:.88rem;font-weight:700;color:#fff !important;margin-bottom:3px;}
        .notif-item p{font-size:.78rem;color:var(--text-dim) !important;}
        @media(max-width:600px){section{padding:80px 5%;}.bottom-nav-deck{width:95%;padding:8px 12px;gap:5px;border-radius:30px;bottom:15px;}.deck-item{width:38px;height:38px;font-size:1.1rem;}.deck-item.home-btn{width:48px;height:48px;font-size:1.2rem;transform:translateY(-10px);}.deck-item::after{display:none;}}
    </style>
</head>
<body>
    <div id="custom-cursor"></div>
    <div id="cursor-glow"></div>
    <canvas id="bg-canvas"></canvas>
    <div class="notif" id="notifContainer"></div>

    <nav class="bottom-nav-deck">
        <a href="wallet.html" class="deck-item hover-trigger" data-tooltip="Wallet"><i class="fas fa-wallet"></i></a>
        <a href="restaurantes.html" class="deck-item hover-trigger" data-tooltip="Comida"><i class="fas fa-utensils"></i></a>
        <a href="mapa.html" class="deck-item hover-trigger" data-tooltip="Mapa"><i class="fas fa-map-marker-alt"></i></a>
        <a href="index.html" class="deck-item home-btn hover-trigger" data-tooltip="Inicio"><i class="fas fa-home"></i></a>
        <a href="taxi.html" class="deck-item hover-trigger" data-tooltip="Transporte"><i class="fas fa-car"></i></a>
        <a href="hospedaje.html" class="deck-item hover-trigger" data-tooltip="Hospedaje"><i class="fas fa-bed"></i></a>
        <a href="sos.html" class="deck-item emergency hover-trigger" data-tooltip="SOS"><i class="fas fa-shield-alt"></i></a>
    </nav>

    <section id="comunidad">
        <div class="section-header gsap-anim-up">
            <h2>La <span class="gradient-text">Comunidad</span> habla</h2>
            <p>Comparte tu experiencia y descubre qué dicen otros visitantes</p>
        </div>
        <div class="review-form-box gsap-anim-up">
            <h3><i class="fas fa-pen" style="color:var(--mx-gold);margin-right:8px;"></i> Comparte tu experiencia</h3>
            <div style="display:flex;gap:14px;align-items:flex-start;">
                <div class="review-avatar">TU</div>
                <div style="flex:1;display:flex;flex-direction:column;gap:10px;">
                    <textarea id="reviewText" rows="3" style="background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:14px;padding:14px;color:#fff;font-family:'Plus Jakarta Sans',sans-serif;font-size:.9rem;resize:none;outline:none;width:100%;transition:.3s;" placeholder="¿Cómo estuvo la comida? ¿El servicio? ¿Lo recomendarías a alguien que viene al Mundial?"></textarea>
                    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;">
                        <div>
                            <div style="font-size:.75rem;color:var(--text-dim);margin-bottom:5px;">Tu calificación:</div>
                            <div class="star-input" id="starInput">
                                <i class="fas fa-star" data-val="1"></i><i class="fas fa-star" data-val="2"></i><i class="fas fa-star" data-val="3"></i><i class="fas fa-star" data-val="4"></i><i class="fas fa-star" data-val="5"></i>
                            </div>
                        </div>
                        <div style="display:flex;gap:12px;align-items:center;">
                            <label class="photo-upload hover-trigger">
                                <i class="fas fa-camera"></i><span>Subir fotos</span>
                                <input type="file" accept="image/*" multiple style="display:none;" onchange="handlePhotoUpload(event)">
                            </label>
                            <button class="btn-mx hover-trigger" onclick="submitReview()" style="padding:9px 22px;font-size:.82rem;border:none;cursor:pointer;">Publicar</button>
                        </div>
                    </div>
                    <div id="photoPreview" style="display:flex;gap:8px;flex-wrap:wrap;"></div>
                </div>
            </div>
        </div>
        <div class="reviews-list" id="reviewsList"></div>
    </section>

    <script>
        const cursor=document.getElementById('custom-cursor');const glow=document.getElementById('cursor-glow');let mx=0,my=0;
        document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;cursor.style.left=mx+'px';cursor.style.top=my+'px';glow.animate({left:`${mx}px`,top:`${my}px`},{duration:800,fill:'forwards'});});
        document.querySelectorAll('.hover-trigger,a,button,select,input').forEach(el=>{el.addEventListener('mouseenter',()=>cursor.classList.add('hovered'));el.addEventListener('mouseleave',()=>cursor.classList.remove('hovered'));});
        const canvas=document.getElementById('bg-canvas');const ctx=canvas.getContext('2d');let stars=[];
        class Star{constructor(){this.x=Math.random()*window.innerWidth;this.y=Math.random()*window.innerHeight;this.size=Math.random()*1.5;this.baseX=this.x;this.baseY=this.y;this.density=Math.random()*30+1;this.color=Math.random()>.8?'#f5a623':Math.random()>.5?'#006847':'#fff';}draw(){ctx.fillStyle=this.color;ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,2*Math.PI);ctx.fill();}update(){let dx=mx-this.x,dy=my-this.y,dist=Math.sqrt(dx*dx+dy*dy);if(dist<120){this.x-=dx/dist*((120-dist)/120)*this.density;this.y-=dy/dist*((120-dist)/120)*this.density;}else{this.x+=.05*(this.baseX-this.x);this.y+=.05*(this.baseY-this.y);}}}
        function initStars(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;stars=[];for(let i=0;i<200;i++)stars.push(new Star());}
        function animateStars(){ctx.clearRect(0,0,canvas.width,canvas.height);stars.forEach(s=>{s.update();s.draw();});requestAnimationFrame(animateStars);}
        window.addEventListener('resize',initStars);initStars();animateStars();

        let userStars=0;
        document.querySelectorAll('#starInput i').forEach((star,i)=>{star.addEventListener('click',()=>{userStars=i+1;document.querySelectorAll('#starInput i').forEach((s,j)=>s.classList.toggle('active',j<=i));});});

        let uploadedPhotos=[];
        function handlePhotoUpload(e){Array.from(e.target.files).forEach(f=>{const reader=new FileReader();reader.onload=ev=>{uploadedPhotos.push(ev.target.result);renderPhotoPreview();};reader.readAsDataURL(f);});}
        function renderPhotoPreview(){document.getElementById('photoPreview').innerHTML=uploadedPhotos.map((p,i)=>`<div style="position:relative;"><img src="${p}" style="width:70px;height:60px;object-fit:cover;border-radius:8px;border:1px solid rgba(255,255,255,0.1)"><button onclick="removePhoto(${i})" style="position:absolute;top:-5px;right:-5px;width:18px;height:18px;background:var(--mx-red);border:none;border-radius:50%;color:#fff;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;">×</button></div>`).join('');}
        function removePhoto(i){uploadedPhotos.splice(i,1);renderPhotoPreview();}

        const sampleReviews=[
            {user:"Alo",flag:"🇲🇽",avatar:"AVATAR",text:"Los tacos de Don Memo son exactamente lo que un turista necesita conocer de México. Auténtico, barato y delicioso. Lo visité con mi familia durante el partido de México vs Argentina y fue el mejor complemento del día.",stars:5,rest:"La Taquería de Don Memo",photos:["https://images.unsplash.com/photo-1565299585323-38d6b0865b47?auto=format&fit=crop&w=200","https://images.unsplash.com/photo-1602827114231-01e9c09b91b0?auto=format&fit=crop&w=200"],likes:47,time:"Hace 2 horas"},
            {user:"Poncho",flag:"🇫🇷",avatar:"AVATAR",text:"Je ne savais pas qu'une fonda pouvait être aussi incroyable.",stars:5,rest:"Fonda Doña Carmen",photos:["https://images.unsplash.com/photo-1504674900247-0877df9cc836?auto=format&fit=crop&w=200"],likes:31,time:"Hace 5 horas"},
            {user:"Memo",flag:"US",avatar:"AVATAR",text:"Food was really tasty. I love the authentic flavors and the friendly service. This place deserves more recognition.",stars:5,rest:"Pozolería Los Compadres",photos:[],likes:89,time:"Hace 1 día"},
            {user:"Roy",flag:"MX",avatar:"AVATAR",text:"Me encanto, vine al mundial y me gusto este restaurante local.",stars:4,rest:"Fonda Doña Carmen",photos:["https://images.unsplash.com/photo-1540189549336-e6e99c3679fe?auto=format&fit=crop&w=200"],likes:12,time:"Hace 3 días"},
        ];

        function renderReviews(list){
            document.getElementById('reviewsList').innerHTML=list.map(r=>`<div class="review-card"><div class="review-header"><img src="${r.avatar}" class="review-avatar-sm" alt="${r.user}"><div class="review-user-info"><h4>${r.flag} ${r.user}</h4><p>${r.rest} · ${r.time}</p></div><div class="review-stars">${'<i class="fas fa-star"></i>'.repeat(r.stars)}</div></div><p class="review-text">${r.text}</p>${r.photos.length?`<div class="review-photos">${r.photos.map(p=>`<img src="${p}" alt="foto" loading="lazy">`).join('')}</div>`:''}<div class="review-actions"><button onclick="likeReview(this)"><i class="fas fa-heart"></i> <span class="like-count">${r.likes}</span> Me gusta</button><button><i class="fas fa-reply"></i> Responder</button><button><i class="fas fa-share"></i> Compartir</button><span class="review-flag"><i class="fas fa-store"></i> Local verificado</span></div></div>`).join('');
        }
        renderReviews(sampleReviews);

        function likeReview(btn){const span=btn.querySelector('.like-count');const n=parseInt(span.textContent);const liked=btn.classList.toggle('liked');span.textContent=liked?n+1:n-1;btn.style.color=liked?'var(--mx-red)':'';}

        function submitReview(){
            const text=document.getElementById('reviewText').value.trim();
            if(!text||!userStars){showNotif('⚠️ Completa tu reseña','Escribe un comentario y elige una calificación.','warn');return;}
            const newReview={user:"Tú",flag:"👤",avatar:"https://api.dicebear.com/7.x/avataaars/svg?seed=tu",text,stars:userStars,rest:"Restaurante seleccionado",photos:uploadedPhotos.slice(0,3),likes:0,time:"Ahora mismo"};
            sampleReviews.unshift(newReview);renderReviews(sampleReviews);
            document.getElementById('reviewText').value='';uploadedPhotos=[];document.getElementById('photoPreview').innerHTML='';
            document.querySelectorAll('#starInput i').forEach(s=>s.classList.remove('active'));userStars=0;
            showNotif('✅ Reseña publicada','¡Gracias por compartir tu experiencia!','success');
        }

        function showNotif(title,msg,type='success'){const container=document.getElementById('notifContainer');const el=document.createElement('div');el.className='notif-item';el.style.borderLeftColor=type==='success'?'var(--mx-green)':type==='warn'?'var(--mx-gold)':'var(--mx-red)';el.innerHTML=`<h4>${title}</h4><p>${msg}</p>`;container.appendChild(el);setTimeout(()=>el.classList.add('show'),50);setTimeout(()=>{el.classList.remove('show');setTimeout(()=>el.remove(),400);},4000);}

        gsap.registerPlugin(ScrollTrigger);
        gsap.utils.toArray('.gsap-anim-up').forEach(el=>{gsap.fromTo(el,{opacity:0,y:40},{opacity:1,y:0,duration:1,ease:'power3.out',scrollTrigger:{trigger:el,start:'top 85%'}});});
    </script>
</body>
</html>
