<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OFFSIDE 2026 | Restaurantes</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* 🚨 HACK WORDPRESS 🚨 */
        header#masthead, header.site-header, .elementor-location-header, header[data-elementor-type="header"], .ast-primary-header-bar, .site-header { display: none !important; opacity: 0 !important; height: 0 !important; overflow: hidden !important; pointer-events: none !important; }
        .site-content, .site-main, #content, body { margin-top: 0 !important; padding-top: 0 !important; }
        
        :root { --mx-green:#006847;--mx-red:#ce1126;--mx-gold:#f5a623;--mx-dark:#0a0f0d;--mx-gradient:linear-gradient(135deg,var(--mx-green),#009a63,var(--mx-gold));--glass:rgba(10,15,13,0.75);--border:1px solid rgba(255,255,255,0.1);--text-main:#f0ede8;--text-dim:#8a9e94; }
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}html{scroll-behavior:smooth;}
        body{background-color:var(--mx-dark);color:var(--text-main);font-family:'Plus Jakarta Sans',sans-serif;overflow-x:hidden;cursor:none;line-height:1.6; padding-bottom: 120px; margin-top:0;}
        #custom-cursor{width:10px;height:10px;background:var(--mx-gold);border-radius:50%;position:fixed;pointer-events:none;z-index:10000;transform:translate(-50%,-50%);box-shadow:0 0 15px rgba(245,166,35,0.8);transition:width .3s,height .3s,background-color .3s;}
        #custom-cursor.hovered{width:26px;height:26px;background:var(--mx-red);box-shadow:0 0 25px rgba(206,17,38,0.8);}
        #cursor-glow{width:500px;height:500px;background:radial-gradient(circle,rgba(0,104,71,.12) 0,rgba(245,166,35,.05) 40%,transparent 65%);position:fixed;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);mix-blend-mode:screen;}
        #bg-canvas{position:fixed;top:0;left:0;width:100%;height:100vh;z-index:0;}
        .btn-mx{padding:11px 30px;background:var(--mx-gradient);color:#fff !important;border-radius:50px;font-weight:800;text-transform:uppercase;letter-spacing:1px;text-decoration:none;border:none;box-shadow:0 5px 20px rgba(0,104,71,.4);transition:.4s;font-size:.82rem;cursor:none;display:inline-block;}
        section{padding:80px 10%;position:relative;z-index:1;} .section-header{text-align:center;margin-bottom:70px;} .section-header h2{font-family:'Syne',sans-serif;font-size:clamp(2rem,3.5vw,3.2rem);font-weight:800;margin-bottom:16px;letter-spacing:-1px;color:#fff !important;} .section-header p{color:var(--text-dim) !important;font-size:1.05rem;} .gradient-text{background:var(--mx-gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;} .gsap-anim-up{opacity:0;transform:translateY(40px);}
        .search-section{padding:80px 10% 0;position:relative;z-index:2;} .search-box{background:rgba(15,22,17,0.9);backdrop-filter:blur(20px);border:var(--border);border-radius:24px;padding:30px;box-shadow:0 30px 60px rgba(0,0,0,0.5);} .search-box h3{font-size:1.1rem;font-weight:700;color:#fff !important;margin-bottom:20px;} .search-row{display:grid;grid-template-columns:1fr 200px 200px auto;gap:12px;align-items:end;} .search-field{display:flex;flex-direction:column;gap:6px;} .search-field label{font-size:.75rem;text-transform:uppercase;letter-spacing:1px;color:var(--text-dim) !important;font-weight:600;} .search-field input, .search-field select{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.12);border-radius:12px;padding:12px 16px;color:#fff;font-family:'Plus Jakarta Sans',sans-serif;font-size:.9rem;transition:.3s;outline:none;cursor:none;} .search-field input:focus, .search-field select:focus{border-color:var(--mx-gold);background:rgba(245,166,35,0.06);} .search-field select option{background:#0a0f0d;color:#fff;} .btn-search{padding:12px 28px;background:var(--mx-gradient);border:none;border-radius:12px;color:#fff;font-weight:700;font-size:.9rem;cursor:pointer;transition:.3s;display:flex;align-items:center;gap:8px;white-space:nowrap;} .search-tags{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;} .tag{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:50px;padding:5px 14px;font-size:.78rem;color:var(--text-dim) !important;cursor:pointer;transition:.3s;} .tag:hover, .tag.active{background:rgba(245,166,35,0.15);border-color:var(--mx-gold);color:var(--mx-gold) !important;}
        .restaurants-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:28px;} .rest-card{background:rgba(255,255,255,0.02);border:var(--border);border-radius:24px;overflow:hidden;transition:.4s;cursor:pointer;} .rest-card:hover{transform:translateY(-8px);border-color:rgba(245,166,35,.3);box-shadow:0 20px 40px rgba(0,0,0,0.4);} .rest-card-img{position:relative;height:200px;overflow:hidden;} .rest-card-img img{width:100%;height:100%;object-fit:cover;transition:.5s;} .rest-card:hover .rest-card-img img{transform:scale(1.08);} .rest-badge{position:absolute;top:12px;left:12px;background:var(--mx-green);color:#fff !important;font-size:.7rem;font-weight:700;padding:4px 12px;border-radius:50px;} .rest-badge.local{background:var(--mx-red);} .rest-badge.popular{background:var(--mx-gold);color:#0a0f0d !important;} .rest-fav{position:absolute;top:12px;right:12px;width:34px;height:34px;background:rgba(10,15,13,0.8);backdrop-filter:blur(10px);border-radius:50%;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.6) !important;font-size:.9rem;transition:.3s;border:none;cursor:pointer;} .rest-fav:hover,.rest-fav.active{color:var(--mx-red) !important;} .rest-card-body{padding:20px;} .rest-card-body h3{font-size:1.1rem;font-weight:700;color:#fff !important;margin-bottom:6px;} .rest-meta{display:flex;align-items:center;gap:14px;margin-bottom:12px;flex-wrap:wrap;} .rest-meta span{font-size:.78rem;color:var(--text-dim) !important;display:flex;align-items:center;gap:4px;} .rest-meta .stars{color:var(--mx-gold) !important;} .rest-card-footer{display:flex;align-items:center;justify-content:space-between;padding-top:14px;border-top:1px solid rgba(255,255,255,0.07);margin-top:12px;} .price-range{font-size:.85rem;font-weight:700;color:var(--mx-gold) !important;} .btn-sm{padding:7px 16px;border-radius:8px;font-size:.78rem;font-weight:700;border:none;cursor:pointer;transition:.3s;} .btn-sm.reserve{background:var(--mx-green);color:#fff;} .btn-sm.order{background:rgba(245,166,35,0.15);color:var(--mx-gold);border:1px solid rgba(245,166,35,0.3);}
        .notif{position:fixed;bottom:30px;right:30px;z-index:9000;display:flex;flex-direction:column;gap:10px;} .notif-item{background:#0e1a13;border:var(--border);border-left:3px solid var(--mx-green);border-radius:14px;padding:14px 18px;max-width:300px;transform:translateX(120%);transition:.4s;} .notif-item.show{transform:translateX(0);} .notif-item h4{font-size:.88rem;color:#fff !important;} .notif-item p{font-size:.78rem;color:var(--text-dim) !important;}

        /* NUEVO DOCK ESTILO MACOS */
        .bottom-nav-deck{position:fixed;bottom:25px;left:50%;transform:translateX(-50%);display:flex;align-items:center;justify-content:center;gap:clamp(10px,2vw,18px);background:rgba(10,15,13,0.65);backdrop-filter:blur(25px);-webkit-backdrop-filter:blur(25px);padding:10px 20px;border-radius:40px;border:1px solid rgba(255,255,255,0.1);box-shadow:0 20px 40px rgba(0,0,0,0.6),inset 0 1px 0 rgba(255,255,255,0.1);z-index:9000;transition:all .4s;} .bottom-nav-deck:hover{background:rgba(10,15,13,0.85);border-color:rgba(255,255,255,0.2);} .deck-item{color:var(--text-dim);text-decoration:none;font-size:1.25rem;width:45px;height:45px;display:flex;align-items:center;justify-content:center;border-radius:50%;transition:all .3s ease;position:relative;cursor:none;} .deck-item:hover,.deck-item.active{color:#fff;background:rgba(255,255,255,0.1);transform:translateY(-5px) scale(1.1);} .deck-item::after{content:attr(data-tooltip);position:absolute;top:-45px;background:rgba(0,0,0,0.8);color:#fff;font-size:.75rem;font-weight:600;padding:6px 12px;border-radius:8px;opacity:0;pointer-events:none;transform:translateY(10px);transition:all .3s;white-space:nowrap;border:1px solid rgba(255,255,255,0.1);} .deck-item:hover::after{opacity:1;transform:translateY(0);} .deck-item.home-btn{background:var(--mx-gradient);color:#fff!important;width:55px;height:55px;font-size:1.4rem;transform:translateY(-15px);box-shadow:0 10px 25px rgba(0,104,71,0.5);border:3px solid var(--mx-dark);} .deck-item.home-btn:hover{transform:translateY(-20px) scale(1.05);} .deck-item.emergency{color:var(--mx-red);} .deck-item.emergency:hover{background:rgba(206,17,38,0.15);color:#ff4d4d;}
        @media(max-width:900px){.search-row{grid-template-columns:1fr;}} @media(max-width:600px){section{padding:80px 5%;}.search-section{padding:80px 5% 0;}.restaurants-grid{grid-template-columns:1fr;}.bottom-nav-deck{width:95%;padding:8px 12px;gap:5px;border-radius:30px;bottom:15px;}.deck-item{width:38px;height:38px;font-size:1.1rem;}.deck-item.home-btn{width:48px;height:48px;font-size:1.2rem;transform:translateY(-10px);}.deck-item::after{display:none;}}
    </style>
</head>
<body>
    <div id="custom-cursor"></div><div id="cursor-glow"></div><canvas id="bg-canvas"></canvas><div class="notif" id="notifContainer"></div>

    <nav class="bottom-nav-deck">
        <a href="restaurantes.html" class="deck-item active hover-trigger" data-tooltip="Comida"><i class="fas fa-utensils"></i></a>
        <a href="mapa.html" class="deck-item hover-trigger" data-tooltip="Mapa"><i class="fas fa-map-marker-alt"></i></a>
        <a href="index.html" class="deck-item home-btn hover-trigger" data-tooltip="Inicio"><i class="fas fa-home"></i></a>
        <a href="wallet.html" class="deck-item hover-trigger" data-tooltip="Wallet"><i class="fas fa-wallet"></i></a>
        <a href="sos.html" class="deck-item emergency hover-trigger" data-tooltip="SOS"><i class="fas fa-shield-alt"></i></a>
    </nav>

    <div class="search-section">
        <div class="search-box gsap-anim-up">
            <h3><i class="fas fa-search" style="color:var(--mx-gold);margin-right:8px;"></i> Encuentra tu restaurante ideal</h3>
            <div class="search-row">
                <div class="search-field"><label>¿Qué quieres comer?</label><input type="text" id="searchInput" placeholder="Tacos, tamales, pozole..." oninput="filterRestaurants()"></div>
                <div class="search-field"><label>Zona / Colonia</label><select id="zonaFilter" onchange="filterRestaurants()"><option value="">Toda la ciudad</option><option value="cdmx">Ciudad de México</option></select></div>
                <div class="search-field"><label>Tipo</label><select id="tipoFilter" onchange="filterRestaurants()"><option value="">Todo</option><option value="local">Locales pequeños</option></select></div>
                <button class="btn-search hover-trigger" onclick="filterRestaurants()"><i class="fas fa-search"></i> Buscar</button>
            </div>
        </div>
    </div>

    <section id="restaurantes">
        <div class="section-header gsap-anim-up"><h2>Restaurantes <span class="gradient-text">Locales</span></h2><p>Apoya a los pequeños negocios — son el principal motor gastronómico de México</p></div>
        <div class="restaurants-grid" id="restaurantsGrid"></div>
    </section>

    <script>
        const cursor=document.getElementById('custom-cursor');const glow=document.getElementById('cursor-glow');let mx=0,my=0;
        document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;cursor.style.left=mx+'px';cursor.style.top=my+'px';glow.animate({left:`${mx}px`,top:`${my}px`},{duration:800,fill:'forwards'});});
        document.querySelectorAll('.hover-trigger,a,button,select,input').forEach(el=>{el.addEventListener('mouseenter',()=>cursor.classList.add('hovered'));el.addEventListener('mouseleave',()=>cursor.classList.remove('hovered'));});
        const canvas=document.getElementById('bg-canvas');const ctx=canvas.getContext('2d');let stars=[];
        class Star{constructor(){this.x=Math.random()*window.innerWidth;this.y=Math.random()*window.innerHeight;this.size=Math.random()*1.5;this.baseX=this.x;this.baseY=this.y;this.density=Math.random()*30+1;this.color=Math.random()>.8?'#f5a623':Math.random()>.5?'#006847':'#fff';}draw(){ctx.fillStyle=this.color;ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,2*Math.PI);ctx.fill();}update(){let dx=mx-this.x,dy=my-this.y,dist=Math.sqrt(dx*dx+dy*dy);if(dist<120){this.x-=dx/dist*((120-dist)/120)*this.density;this.y-=dy/dist*((120-dist)/120)*this.density;}else{this.x+=.05*(this.baseX-this.x);this.y+=.05*(this.baseY-this.y);}}}
        function initStars(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;stars=[];for(let i=0;i<200;i++)stars.push(new Star());}
        function animateStars(){ctx.clearRect(0,0,canvas.width,canvas.height);stars.forEach(s=>{s.update();s.draw();});requestAnimationFrame(animateStars);}
        window.addEventListener('resize',initStars);initStars();animateStars();
        const restaurants=[{id:1,name:"Taqueria arandas",zone:"Dolores de agua Mex",tipo:"local",tags:["tacos"],cuisine:"Tacos",rating:4.4,reviews:1068,price:"$$",badge:"local",badgeText:"Local Favorito",img:"https://images.unsplash.com/photo-1565299585323-38d6b0865b47?auto=format&fit=crop&w=600",lat:19.44,lng:-99.13,desc:"Los mejores tacos!."}];
        function renderRestaurants(list){document.getElementById('restaurantsGrid').innerHTML=list.map(r=>`<div class="rest-card hover-trigger"><div class="rest-card-img"><img src="${r.img}" alt="${r.name}">${r.badge?`<span class="rest-badge ${r.badge}">${r.badgeText}</span>`:''}<button class="rest-fav hover-trigger" onclick="toggleFav(event,this)"><i class="fas fa-heart"></i></button></div><div class="rest-card-body"><h3>${r.name}</h3><div class="rest-meta"><span class="stars">${'★'.repeat(Math.round(r.rating))}</span><span style="color:var(--mx-gold)">${r.rating}</span><span>(${r.reviews} reseñas)</span></div><p style="font-size:.82rem;color:var(--text-dim);">${r.desc}</p><div class="rest-card-footer"><span class="price-range">${r.price}</span><div class="card-actions"><button class="btn-sm reserve hover-trigger">Reservar</button></div></div></div></div>`).join('');}
        renderRestaurants(restaurants); function filterRestaurants(){ renderRestaurants(restaurants); } function toggleFav(e,btn){e.stopPropagation();btn.classList.toggle('active');showNotif('Guardado','Restaurante favorito','success');}
        function showNotif(title,msg,type='success'){const container=document.getElementById('notifContainer');const el=document.createElement('div');el.className='notif-item';el.style.borderLeftColor=type==='success'?'var(--mx-green)':type==='warn'?'var(--mx-gold)':'var(--mx-red)';el.innerHTML=`<h4>${title}</h4><p>${msg}</p>`;container.appendChild(el);setTimeout(()=>el.classList.add('show'),50);setTimeout(()=>{el.classList.remove('show');setTimeout(()=>el.remove(),400);},4000);}
        gsap.registerPlugin(ScrollTrigger); gsap.utils.toArray('.gsap-anim-up').forEach(el=>{gsap.fromTo(el,{opacity:0,y:40},{opacity:1,y:0,duration:1,ease:'power3.out',scrollTrigger:{trigger:el,start:'top 85%'}});});
    </script>
    
</body>
</html>
